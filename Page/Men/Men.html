<script>
let menuOpen = false;

function toggleMenu() {
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const icon = document.getElementById("menuIcon");

menuOpen = !menuOpen;

menu.classList.toggle("-translate-x-full");
overlay.classList.toggle("hidden");
icon.classList.toggle("fa-bars");
icon.classList.toggle("fa-times");
}

function toggleSearch() {
document.getElementById("mobileSearch").classList.toggle("hidden");
}

/* ELEMENTS */
const desktopInput = document.getElementById("searchInput");
const mobileInput = document.getElementById("mobileSearchInput");
const list = document.getElementById("Men-list");
const noResult = document.getElementById("noResult");

/* DATA */
// let allProducts = menProducts;

/* RENDER */
function renderProducts(products) {
list.innerHTML = "";

if (products.length === 0) {
noResult.classList.remove("hidden");
return;
}

noResult.classList.add("hidden");

products.forEach((item, i) => {
list.innerHTML += `
<div class="card animate-fadeUp flex flex-col" style="animation-delay:${i*0.1}s">
<img src="${item.image}" class="w-full h-48 object-cover">

<div class="p-3 flex flex-col flex-1">
<h3 class="text-sm font-bold">${item.name}</h3>
<p class="text-cyan-400">$${item.price}</p>

<div class="mt-auto flex flex-col gap-2">
<button class="bg-cyan-500 py-2 rounded active:scale-95">Add to Cart</button>
<button class="bg-white/10 py-2 rounded active:scale-95">View</button>
</div>

</div>
</div>
`;
});
}

);

}
