<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        .summary-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        }

        .checkout-btn {
            background: linear-gradient(to right, red, orange);
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: linear-gradient(to right, blue, purple);
        }

        /* CART ITEM */
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .cart-item:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .cart-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .remove-btn {
            background: red;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .remove-btn:hover {
            background: darkred;
        }

        /* NAV */
        .bgs {
            background: linear-gradient(to right, red, purple, blue);
        }

        /* EMPTY */
        .empty {
            text-align: center;
            margin-top: 100px;
            opacity: 0.7;
        }

        /* QTY BUTTON */
        .qty-btn {
            background: gray;
            padding: 4px 10px;
            border-radius: 5px;
        }

        .qty-btn:hover {
            background: rgb(238, 8, 8);
            cursor: pointer;
        }

        .qty-btnup {
            background: gray;
            padding: 4px 10px;
            border-radius: 5px;
        }

        .qty-btnup:hover {
            background: rgb(13, 88, 227);
            cursor: pointer;
        }

        .cart-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* IMAGE */
        .cart-img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
        }

        .remove-btn {
            background: red;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .bgc:hover {
            background-color: #361703;
        }

        .menu {
            width: 130px;
            height: 30px;
            cursor: pointer;
            border-radius: 6px;
        }

        .Menu {
            width: 130px;
            height: 30px;

        }
    </style>
</head>

<body class="bg-black text-white">

    <!-- HEADER -->
    <nav class="bgs flex justify-between items-center px-10 py-3">
        <h1 class="text-2xl font-bold">🛒 PC SHOP</h1>

        <a href="#" onclick="goBack()" class="bg-blue-500 px-4 py-1 rounded hover:bg-blue-700">
            ← Back to Shop
        </a>
    </nav>

    <!-- CART -->
    <section class="px-10 mt-10">
        <h2 class="text-4xl font-bold mb-8 text-center">Your Cart</h2>

        <div class="grid grid-cols-3 gap-8">

            <!-- ITEMS -->
            <div id="cart-items" class="col-span-2 space-y-5"></div>

            <!-- SUMMARY -->
            <div class="summary-box p-6 rounded-xl sticky top-10 h-fit">
                <h3 class="text-2xl font-bold mb-4">Summary</h3>

                <div class="flex justify-between mb-2">
                    <span>Total Items</span>
                    <span id="total-items">0</span>
                </div>

                <div class="flex justify-between mb-4 text-xl font-bold">
                    <span>Total</span>
                    <span id="total-price">$0</span>
                </div>

                <button onclick="checkout()" class="checkout-btn w-full py-2 rounded-lg font-bold mb-3 cursor-pointer">
                    Checkout
                </button>

                <button onclick="clearCart()" class="w-full bg-gray-700 py-2 rounded hover:bg-gray-900 cursor-pointer">
                    Clear Cart
                </button>
            </div>
        </div>
        </div>
    </section>
    <script>

        let selectedColor = "All";
        function filterByColor(color) {
            selectedColor = color;

            const badge = document.getElementById("active-color");

            if (color === "All") {
                badge.classList.add("hidden");
            } else {
                badge.classList.remove("hidden");
                badge.innerText = "Color: " + color;
            }

            loadCart();
        }

        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            const cartContainer = document.getElementById("cart-items");
            const totalItems = document.getElementById("total-items");
            const totalPrice = document.getElementById("total-price");

            cartContainer.innerHTML = "";

            if (cart.length === 0) {
                cartContainer.innerHTML = `
        <div class="empty">
            <h2 class="text-2xl font-bold text-red-500">🛒 Cart is Empty</h2>
            <p>Add some products first...</p>
        </div>`;
                totalItems.innerText = 0;
                totalPrice.innerText = "$0";
                return;
            }

            let total = 0;
            let count = 0;

            let html = `
    <!-- FILTER -->
    <div class="flex flex-wrap items-center gap-4 mb-6 bg-gray-800 p-4 rounded-xl shadow-lg">

    <!-- LABEL -->
    <div class="text-white font-semibold text-xl tracking-wide">
        🎨 Filter by Color:
    </div>

    <!-- SELECT -->
    <div class="relative">
        <select 
            onchange="filterByColor(this.value)" 
            class="appearance-none bg-gray-900 text-white border border-gray-600 
                   px-4 py-2 pr-10 rounded-lg text-sm 
                   focus:outline-none focus:ring-2 focus:ring-pink-500 
                   hover:border-pink-400 transition cursor-pointer">

            <option value="All">All Colors</option>
            <option value="Black">Black</option>
            <option value="White">White</option>
            <option value="Blue">Blue</option>
            <option value="Red">Red</option>
        </select>

        <!-- CUSTOM ARROW -->
        <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2"
                 viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
        </div>
    </div>

    <!-- ACTIVE FILTER BADGE -->
    <div id="active-color" class="text-xs bg-pink-500 text-white px-3 py-1 rounded-full hidden">
        Color: All
    </div>

</div>
    `;

            cart.forEach((item, index) => {
                // FILTER
                let itemColor = (item.color || "").toLowerCase();
                let filterColor = selectedColor.toLowerCase();
                if (filterColor !== "all" && itemColor !== filterColor) return;
                if (!item.qty) item.qty = 1;
                total += item.price * item.qty;
                count++;

                html += `
            <div class="cart-row">
                <div class="flex items-center gap-4 w-1/3">
                    <img src="${item.image}" class="cart-img">
                    <div>
                        <h4>${item.name}</h4>
                        <p>Color: ${item.color}</p>
                    </div>
            </div>

            <div>$${item.price}</div>

                <div class="flex gap-6 ">
                    <button onclick="changeQty(${index}, -1)" class="qty-btn"><i class="fa-solid fa-arrow-down"></i></button>
                    <p class=" text-3xl text-yellow-200  ">${item.qty}</p>
                    <button onclick="changeQty(${index}, 1)" class="qty-btnup"><i class="fa-solid fa-arrow-up"></i></button>
                </div>

                <div class=" bg-gray-500 text-black rounded cursor-pointer Menu">
                    <select onchange="changeColor(${index}, this.value)" class="cursor-pointer menu"><i class="fa-solid fa-bars"></i>
                        <option ${item.color == "Black" ? "selected" : ""}>Black</option>
                        <option ${item.color == "White" ? "selected" : ""}>White</option>
                        <option ${item.color == "Blue" ? "selected" : ""}>Blue</option>
                        <option ${item.color == "Red" ? "selected" : ""}>Red</option>
                    </select>
                </div>

                <button onclick="removeItem(${index})" class="remove-btn"><i class="fa-solid fa-trash"></i></button>
            </div>
        `;
            });


            cartContainer.innerHTML = html;

            totalItems.innerText = count;
            totalPrice.innerText = "$" + total;
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function changeQty(index, d) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart[index].qty += d;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function changeColor(index, value) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart[index].color = value;
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function clearCart() {
            if (!confirm("Clear all cart?")) return;
            localStorage.removeItem("cart");
            loadCart();
        }

        function checkout() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            if (cart.length === 0) {
                alert("No products to checkout!");
                return;
            }

            if (confirm("Proceed to payment?")) {
                window.location.href = "Payment.html";
            }
        }
        function goBack() {
            let page = localStorage.getItem("backPage");

            if (page === "Home.html") {
                window.location.href = "Home.html";
            }
            else if (page === "Mouse.html") {
                window.location.href = "Mouse.html";
            }
            else if (page === "Computer.html") {
                window.location.href = "Computer.html";
            }
            else if (page === "Keyborad.html") {
                window.location.href = "Keyborad.html";
            }
            else {
                window.location.href = "Home.html";
            }
        }
        loadCart();
    </script>
</body>
</html>
