<!DOCTYPE html>
<html lang="en">

<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.animate-fadeUp {
    animation: fadeUp 0.6s ease forwards;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
}
</style>

</head>

<body class="bg-gradient-to-b from-black via-gray-900 to-black text-white">

<!-- NAV -->
<nav class="sticky top-0 z-50 backdrop-blur-md bg-white/5 border-b border-white/10 px-6 md:px-10 py-4 flex justify-between items-center">

    <h1 class="text-3xl font-extrabold tracking-[6px] text-pink-400 drop-shadow-[0_0_15px_pink]">
        VEXO ❤️
    </h1>

    <input id="search" type="search" onkeyup="searchProduct()"
        placeholder="Search couple outfits..."
        class="hidden md:block w-[300px] px-4 py-2 rounded-full bg-white/10 border border-white/10
        text-white focus:outline-none focus:ring-2 focus:ring-pink-400">

    <ul class="flex gap-6 text-sm uppercase font-medium">
        <li class="text-pink-400 border-b-2 border-pink-400"><a href="Home.html">Home</a></li>
        <li><a href="/Page/Men/Men.html">Men</a></li>
        <li><a href="/Page/Women/whomen.html">Women</a></li>
        <li><a href="/Page/Couple/Couple.html">Couple</a></li>
        <li><a href="/Page/Carts/Addcart.html">Cart</a></li>
        <li>
            <a href="/Page/Login/Login.html"    
                class="px-4 py-2 rounded-full bg-cyan-500 hover:bg-cyan-600 transition font-semibold">
                Login
            </a>
        </li>
    </ul>

</nav>

<!-- HERO -->
<section class="px-6 md:px-10 mt-10">

<div class="rounded-3xl bg-white/5 border border-white/10 backdrop-blur-md
flex flex-col md:flex-row items-center gap-10 p-10 shadow-2xl">

    <div class="animate-fadeUp">
        <h1 class="text-4xl md:text-6xl font-extrabold leading-tight">
            Match Your <span class="text-pink-400">Couple Style</span>
        </h1>

        <p class="mt-4 text-gray-300 text-lg">
            Discover trendy couple outfits for romantic, casual, and modern fashion styles.
        </p>

        <button
            class="mt-6 px-7 py-3 rounded-full bg-gradient-to-r from-pink-400 to-red-500
            hover:scale-105 transition font-bold shadow-lg">
            Shop Now ❤️
        </button>
    </div>

    <img id="slider"
        src="https://i.pinimg.com/736x/53/64/39/536439a1429b19c531e2cd31d5e69b3b.jpg"
        class="rounded-2xl w-full md:w-1/2 h-[320px] object-cover shadow-2xl">

</div>

</section>

<!-- PRODUCTS -->
<section class="px-6 md:px-10 mt-16">

<h2 class="text-center text-3xl font-bold text-pink-400 tracking-[5px] mb-10">
    POPULAR  PRODUCTS

<div id="home-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>


</section>

<!-- FOOTER -->

<h2 class="text-white text-2xl font-bold">VEXO ❤️</h2>
<p class="mt-2">Couple Fashion Store</p>
<p class="mt-6 text-sm">© 2026 VEXO. All rights reserved.</p>

</footer>

<!-- ADD YOUR HOME JS -->
<script src="Home_data.js"></script>

<!-- SLIDER -->
<script>
const images = [
    "/Banner/Couple/couple1.jpg",
    "/Banner/Couple/couple2.jpg",
    "/Banner/Couple/couple3.jpg",
    "/Banner/Couple/couple4.jpg"
];

let index = 0;
const slider = document.getElementById("slider");

setInterval(() => {
    index = (index + 1) % images.length;
    slider.style.opacity = "0.5";

    setTimeout(() => {
        slider.src = images[index];
        slider.style.opacity = "1";
    }, 200);

}, 4000);
</script>

</body>
