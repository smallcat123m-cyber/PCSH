<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | VEXO</title>

    <link rel="stylesheet" href="/src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeUp {
            animation: fadeUp .6s ease forwards;
        }
    </style>

</head>

<body class="bg-black text-white">

    <!-- ================= NAVBAR ================= -->
    <nav
        class="sticky top-0 z-50 bg-black/70 backdrop-blur border-b border-white/10 px-4 md:px-10 py-4 flex justify-between items-center">

        <h1 class="text-2xl md:text-3xl font-extrabold tracking-[4px] text-cyan-400">
            VEXO HOME
        </h1>

        <ul class="hidden md:flex items-center gap-6 text-sm uppercase">
            <!-- <li><a href="Home.html" class="text-cyan-400 border-b-2 border-cyan-400">Home</a></li> -->
            <li class="text-cyan-400 border-b-2 border-cyan-400"><a href="Home.html">Home</a></li>
            <li><a href="/Page/Men/Men.html">Men</a></li>
            <li><a href="/Page/Women/whomen.html">Women</a></li>
            <li><a href="/Page/Couple/Couple.html">Couple</a></li>
            <li><a href="/Page/Carts/Addcart.html">Cart</a></li>
            <li><a href="/Page/Contact/Contact.html">Contact</a></li>
            <li><a href="/Page/About/About.html">About</a></li>
            <li><a href="/Page/Login/Login.html">Login</a></li>

            <li class="relative">
                <a href="/Page/Carts/Addcart.html">
                    <i class="fa fa-shopping-cart"></i>
                    <span id="cart-count"
                        class="absolute -top-2 -right-3 bg-pink-500 text-xs px-1 rounded-full">0</span>
                </a>
            </li>
        </ul>

        <button onclick="toggleMenu()" class="md:hidden text-2xl">
            <i id="menuIcon" class="fa fa-bars"></i>
        </button>

    </nav>

    <!-- ================= MOBILE MENU ================= -->
    <div id="overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black/60 z-40"></div>

    <div id="menu" class="fixed top-0 left-0 w-[85%] max-w-xs h-full bg-black z-50
transform -translate-x-full transition duration-300 p-5 flex flex-col gap-4 text-xl">

        <a href="Home.html" class="p-4 bg-white/5 rounded-xl">🏠 Home</a>
        <a href="/Page/Men/Men.html" class="p-4 bg-white/5 rounded-xl">👕 Men</a>
        <a href="/Page/Women/whomen.html" class="p-4 bg-white/5 rounded-xl">👗 Women</a>
        <a href="/Page/Couple/Couple.html" class="p-4 bg-white/5 rounded-xl">💑 Couple</a>
        <a href="/Page/Carts/Addcart.html" class="p-4 bg-white/5 rounded-xl"> Cart</a>
        <a href="/Page/Contact/Contact.html" class="p-4 bg-white/5 rounded-xl">Caontact</a>
        <a href="/Page/About/About.html" class="p-4 bg-white/5 rounded-xl">About</a>
        <a href="/Page/Login/Login.html" class="p-4 bg-white/5 rounded-xl">Login</a>



    </div>

    <!-- ================= HERO ================= -->
    <section class="px-4 sm:px-6 md:px-10 mt-6">
        <div class="rounded-3xl border border-white/10 bg-white/5 flex flex-col lg:flex-row items-center gap-8 p-6">

            <div class="flex-1 text-center lg:text-left">
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold">
                    Upgrade Your <span class="text-cyan-400">Style</span>
                </h1>

                <p class="mt-4 text-gray-300 text-sm md:text-base">
                    Discover modern fashion for everyone.
                </p>

                <button class="mt-6 px-6 py-3 rounded-full bg-gradient-to-r from-cyan-400 to-blue-500 active:scale-95">
                    Shop Now
                </button>
            </div>

            <div class="w-full lg:w-1/2 overflow-hidden rounded-2xl">
                <div id="sliderWrapper" class="flex transition duration-700">

                    <img src="/Banner/Men_Banner/men1.png" class="w-full flex-shrink-0">
                    <img src="/Banner/Men_Banner/men2.png" class="w-full flex-shrink-0">
                    <img src="/Banner/Men_Banner/men3.png" class="w-full flex-shrink-0">

                </div>
            </div>

        </div>
    </section>

    <!-- ================= PRODUCTS ================= -->
    <section class="px-4 sm:px-6 md:px-10 lg:px-16 mt-12">

        <h2 class="text-center text-xl sm:text-2xl md:text-3xl font-bold text-pink-400 mb-8">
            POPULAR PRODUCTS
        </h2>

        <div id="home-list"
            class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-4 md:gap-6">
        </div>

    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="mt-20 border-t border-white/10 text-center py-6 text-gray-400">
        © 2026 VEXO
    </footer>

    <!-- ================= JS ================= -->
    <script src="/Page/Men/Men_data.js"></script>
    <script src="/Page/Women/Whomen_data.js"></script>
    <script src="/Page/Couple/Couple_data.js"></script>

    <script>

        // CART
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        document.getElementById("cart-count").innerText = cart.length;

        // MERGE DATA
        const Homes = [
            ...(typeof Mens !== "undefined" ? Mens : []),
            ...(typeof Whoments !== "undefined" ? Whoments : []),
            ...(typeof Couples !== "undefined" ? Couples : [])
        ];

        // RENDER
        const Homelist = document.getElementById("home-list");

        function renderProducts(list) {
            Homelist.innerHTML = "";
            let likes = JSON.parse(localStorage.getItem("likes")) || {};

            list.forEach(item => {
                const likeCount = likes[item.id] || 0;

                Homelist.innerHTML += `
<div class="group bg-white/5 border border-white/10 rounded-2xl overflow-hidden hover:border-cyan-400 transition flex flex-col">

<div class="overflow-hidden">
<img src="${item.image}" 
class="w-full h-52 sm:h-56 md:h-60 object-cover group-hover:scale-105 transition">
</div>

<div class="p-4 flex flex-col flex-1">

<h3 class="text-sm md:text-base font-semibold truncate">${item.name}</h3>

<div class="flex justify-between mt-2">
<p class="text-cyan-400 font-bold">$${item.price}</p>

<span class="text-sm">
❤️ <span id="like-${item.id}">${likeCount}</span>
</span>
</div>

<div class="flex gap-2 mt-4">

<button onclick="addLike(${item.id})"
class="flex-1 py-2 rounded-xl bg-red-500/10 text-red-400 active:scale-95">
♥
</button>

<button onclick="viewProduct(${item.id})"
class="flex-1 py-2 rounded-xl bg-cyan-500 active:scale-95">
View
</button>

</div>

</div>
</div>
`;
            });
        }

        // LIKE
        function addLike(id) {
            let likes = JSON.parse(localStorage.getItem("likes")) || {};
            likes[id] = (likes[id] || 0) + 1;
            localStorage.setItem("likes", JSON.stringify(likes));

            document.getElementById(`like-${id}`).innerText = likes[id];
        }

        // VIEW
        function viewProduct(id) {
            const product = Homes.find(p => p.id === id);
            localStorage.setItem("viewProduct", JSON.stringify(product));
            window.location.href = "Views.html";
        }

        // SLIDER
        let index = 0;
        const slider = document.getElementById("sliderWrapper");

        setInterval(() => {
            index++;
            if (index >= slider.children.length) { index = 0; }
            slider.style.transform = `translateX(-${index * 100}%)`;
        }, 3000);

        // MOBILE MENU
        let open = false;
        function toggleMenu() {
            const menu = document.getElementById("menu");
            const overlay = document.getElementById("overlay");
            const icon = document.getElementById("menuIcon");

            open = !open;

            menu.classList.toggle("-translate-x-full");
            overlay.classList.toggle("hidden");

            icon.classList.toggle("fa-bars");
            icon.classList.toggle("fa-times");
        }

        // INIT
        renderProducts(Homes);

    </script>

</body>

</html>
