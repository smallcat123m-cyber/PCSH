<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Payment</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

button{
    padding:10px 20px;
    border:none;
    background:cyan;
    cursor:pointer;
    margin-top:20px;
}

.done{ color:lime; }
.error{ color:red; }
</style>
</head>
<body>

<div class="box">

<h2>📱 Confirm Payment</h2>

<p id="paymentId"></p>

<h3 id="status">Waiting for confirmation...</h3>

<button id="btn" onclick="confirmPayment()">Confirm Payment</button>

</div>

<script>

/* ================= GET PAYMENT ID ================= */
const params = new URLSearchParams(window.location.search);
const paymentId = params.get("id");

const paymentText = document.getElementById("paymentId");
const statusText = document.getElementById("status");
const btn = document.getElementById("btn");

let interval = null;
let isPaid = false;

/* ================= INIT ================= */
if(!paymentId){
    paymentText.innerHTML = "<span class='error'>Invalid QR Code</span>";
    statusText.innerText = "No payment ID found";
    btn.disabled = true;
}else{
    paymentText.innerText = "Payment ID: " + paymentId;
    startChecking();
}

/* ================= CONFIRM PAYMENT ================= */
async function confirmPayment(){

    if(!paymentId || isPaid) return;

    if(!confirm("Confirm payment?")) return;

    try{

        await fetch("http://192.168.0.54:3000/confirm-payment", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ paymentId })
        });

        showSuccess();

    }catch(err){
        alert("Server error!");
        console.error(err);
    }
}

/* ================= CHECK STATUS ================= */
async function checkStatus(){

    if(!paymentId || isPaid) return;

    try{

        let res = await fetch(`http://192.168.0.54:3000/status/${paymentId}`);
        let data = await res.json();

        console.log("STATUS:", data);

        if(data.status === "success"){
            showSuccess();
        }

    }catch(e){
        console.error("Status error:", e);
    }
}

/* ================= START LOOP ================= */
function startChecking(){
    interval = setInterval(checkStatus, 1000);
    checkStatus();
}

/* ================= SUCCESS ================= */
function showSuccess(){

    if(isPaid) return;
    isPaid = true;

    statusText.innerHTML = "<span class='done'>✅ Payment Success</span>";

    btn.disabled = true;
    btn.innerText = "Paid";

    if(interval){
        clearInterval(interval);
    }
}

</script>

</body>
</html>
