<script>
const params = new URLSearchParams(window.location.search);
const paymentId = params.get("id");

const paymentText = document.getElementById("paymentId");
const statusText = document.getElementById("status");
const btn = document.getElementById("btn");

if (!paymentId) {
    paymentText.innerHTML = "<span class='error'>Invalid QR Code</span>";
    statusText.innerText = "No payment ID found";
    btn.disabled = true;
    btn.className = "btn-disabled";
} else {
    paymentText.innerText = "Payment ID: " + paymentId;
}

// ===============================
// FIXED: CONFIRM PAYMENT
// ===============================
async function confirmPayment(){

    const id = new URLSearchParams(location.search).get("id");
    if(!id) return;

    if(!confirm("Confirm payment?")) return;

    // 🔥 SEND TO SERVER
    // ETEC FLOOR 3 IP ADDRESS 
    await fetch("http://192.168.0.155:3000/confirm-payment", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ paymentId: id })
    });

    alert("Payment Successful!");

    window.close();
}

// ===============================
// SHOW IF ALREADY PAID
// ===============================
function checkStatus() {
    if (!paymentId) return;

    let data = localStorage.getItem(paymentId);

    if (!data) return;

    try {
        let parsed = JSON.parse(data);

        if (parsed.status === "success") {
            statusText.innerHTML = "<span class='done'>Payment SUCCESS ✅</span>";
            btn.disabled = true;
            btn.className = "btn-disabled";
            btn.innerText = "Already Paid";
        }
    } catch (e) {}
}

setInterval(checkStatus, 1000);
checkStatus();
</script>
</body>
