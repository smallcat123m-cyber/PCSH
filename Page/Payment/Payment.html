<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Payment</title>

<link rel="stylesheet" href="/src/output.css">

<!-- SOCKET -->
<script src="http://192.168.1.13:3000/socket.io/socket.io.js"></script>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.glass {
  background: rgba(24,24,27,0.6);
  backdrop-filter: blur(20px);
}

.fade-in { animation: fadeIn 0.6s ease; }
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

.glow { box-shadow: 0 0 25px rgba(99,102,241,0.5); }

.pulse {
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.6); }
  70% { box-shadow: 0 0 0 20px rgba(99,102,241,0); }
  100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
}

.dots::after {
  content: '';
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% {content:'';}
  33% {content:'.';}
  66% {content:'..';}
  100% {content:'...';}
}

.locked {
  filter: blur(6px);
  opacity: 0.5;
}

#qrcode {
  width: 180px;
  height: 180px;
  min-width: 180px;
  min-height: 180px;
  display: block;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="glass p-6 rounded-2xl w-[900px]  flex gap-6 shadow-2xl fade-in">

  <!-- LEFT -->
  <div class="flex-1">
    <h2 class="text-2xl font-bold mb-4">🛒 Checkout</h2>

    <div id="orderList" class="bg-zinc-800/60 p-4 rounded-xl mb-4 space-y-2"></div>
    <!-- <div id="images" class="bg-zinc-800/60 p-4 rounded-xl mb-4 space-y-2"></div> -->

    <h3 class="text-lg mb-4">
      Total: $<span id="totalPrice">0</span>
    </h3>

    <div class="w-full bg-zinc-700 h-2 rounded-full mb-2 overflow-hidden">
      <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
    </div>

    <p id="progressText" class="text-gray-400 mb-4 dots">Initializing</p>

    <button onclick="payments()" id="payBtn"
      class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 py-2 rounded-lg">
      Pay Now
    </button>
  </div>

  <!-- RIGHT -->
  <div class="w-[320px] flex flex-col items-center justify-center bg-zinc-800/60 rounded-xl p-4 relative">

    <h3 class="mb-3">📱 QR Payment</h3>

    <div id="timer" class="text-sm text-gray-400 mb-2">Expires in: 02:00</div>

    <div id="qrWrapper" class="locked">
      <div class="bg-white p-4 rounded-xl glow pulse">
        <div id="qrcode"></div>
      </div>
    </div>
   

    <p id="scanText" class="text-gray-400 text-sm mt-3">
      Waiting for payment...
    </p>

    <div id="successBox" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/80 rounded-xl">
      <h2 class="text-green-400 text-2xl font-bold mb-2">✔ Paid</h2>
      <p class="text-gray-400">Redirecting...</p>
    </div>

  </div>

</div>

<script>

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* LOAD */
function loadOrder(){
  let total = 0;
  let list = document.getElementById("orderList");
//   let images = document.getElementById("images");

  list.innerHTML = "";

  cart.forEach(item=>{
    let t = item.price * item.qty;
    total += t;

    list.innerHTML += `
      <div class="flex justify-start gap-4 items-center border-b border-zinc-700 pb-1">
         <img class="w-30 h-30 object-cover rounded" src="${item.image}" alt="">
        <span>Name : ${item.name}<br>
            Qty :  ${item.qty} <br>
            Price  : $${t} <br>
            Date : ${new Date().toLocaleDateString()}</span><br>
      </div>`;
  });

  document.getElementById("totalPrice").innerText = total;
}

/* PAYMENT */
function payments(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  document.getElementById("payBtn").disabled = true;
  startProgress();
}

/* PROGRESS */
let progress = 0;

function startProgress(){
  document.getElementById("progressText").innerText = "Processing";

  let interval = setInterval(()=>{
    progress += 4;
    document.getElementById("progressBar").style.width = progress + "%";

    if(progress >= 100){
      clearInterval(interval);
      unlockQR();
    }
  },150);
}

/* UNLOCK + GENERATE QR */
async function unlockQR(){
  const qr = document.getElementById("qrWrapper");

  qr.classList.remove("locked");
  document.getElementById("scanText").innerText = "📲 Scan now";

  await showQRCode();
}

/* QR */
async function showQRCode(){

  const qrWrapper = document.getElementById("qrWrapper");
  const qrDiv = document.getElementById("qrcode");

  // 🔥 FORCE VISIBILITY FIRST
  qrWrapper.style.opacity = "1";
  qrWrapper.style.transform = "scale(1)";
  qrWrapper.classList.remove("locked");

  // wait DOM paint
  await new Promise(r => requestAnimationFrame(r));

  // clear old QR
  qrDiv.innerHTML = "";

  const res = await fetch("http://192.168.1.13:3000/create-payment", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      amount: document.getElementById("totalPrice").innerText
    })
  });

  const data = await res.json();

  console.log("PAYMENT RESPONSE:", data);

  const paymentId = data.paymentId;

  const scanUrl = `http://192.168.1.13:5500/Page/Payment/scan.html?id=${paymentId}`;

  console.log("QR URL:", scanUrl);

  // 🔥 IMPORTANT: create QR AFTER DOM is fully visible
  setTimeout(() => {
    new QRCode(qrDiv, {
      text: scanUrl,
      width: 180,
      height: 180,
      colorDark: "#000",
      colorLight: "#ffffff"
    });
  }, 50);

  startWatcher(paymentId);
  startTimer();
}
/* TIMER */
function startTimer(){
  let time = 120;

  let t = setInterval(()=>{
    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
      `Expires in: ${m}:${s<10?'0'+s:s}`;

    if(time <= 0){
      clearInterval(t);
      location.reload();
    }
  },1000);
}

/* SOCKET */
function startWatcher(paymentId){
  const socket = io("http://192.168.1.13:3000");

  socket.on("payment-success", (data)=>{
    if(data.paymentId === paymentId){
      success();
    }
  });
}

/* SUCCESS */
function success(){
  document.getElementById("successBox").classList.remove("hidden");

  localStorage.removeItem("cart");

  setTimeout(()=>{
    window.location.href = "/Page/Home/Home.html";
  },2500);
}

/* INIT */
loadOrder();

</script>

</body>
</html>
