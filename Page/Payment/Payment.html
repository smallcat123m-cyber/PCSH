<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Payment</title>

<link rel="stylesheet" href="/src/output.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<!-- SOCKET -->
<script src="http://192.168.0.54:3000/socket.io/socket.io.js"></script>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.glass {
  background: rgba(24,24,27,0.6);
  backdrop-filter: blur(20px);
}

.fade-in { animation: fadeIn 0.6s ease; }
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

.glow { box-shadow: 0 0 25px rgba(99,102,241,0.5); }

.pulse {
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.6); }
  70% { box-shadow: 0 0 0 20px rgba(99,102,241,0); }
  100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
}

.dots::after {
  content: '';
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% {content:'';}
  33% {content:'.';}
  66% {content:'..';}
  100% {content:'...';}
}

.locked {
  filter: blur(6px);
  opacity: 0.5;
}

#qrcode {
  width: 180px;
  height: 180px;
  min-width: 180px;
  min-height: 180px;
  display: block;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen p-3 sm:p-6">

<div class="glass p-4 sm:p-6 rounded-2xl w-full max-w-6xl flex flex-col lg:flex-row gap-6 shadow-2xl fade-in">

  <!-- LEFT -->
  <div class="flex-1 w-full">
    <h2 class="text-xl sm:text-2xl font-bold mb-4">🛒 Checkout</h2>

    <div id="orderList" class="bg-zinc-800/60 p-3 sm:p-4 rounded-xl mb-4 space-y-2 text-sm sm:text-base"></div>

    <h1 class="text-center py-2 uppercase text-yellow-600 text-sm sm:text-base">Banking</h1>

    <!-- BANK BUTTONS -->
    <div class="grid grid-cols-3 gap-2 sm:flex sm:justify-between sm:px-10">
      <button onclick="selectBank('ABA', this)" 
        class="bank-btn bg-blue-300 py-2 rounded-lg text-sm sm:text-base">ABA</button>

      <button onclick="selectBank('WING', this)" 
        class="bank-btn bg-blue-300 py-2 rounded-lg text-sm sm:text-base">Wing</button>

      <button onclick="selectBank('ACLEDA', this)" 
        class="bank-btn bg-blue-300 py-2 rounded-lg text-sm sm:text-base">Acleda</button>
    </div>

    <br>

    <h3 class="text-base sm:text-lg mb-4">
      Total: $<span id="totalPrice">0</span>
    </h3>

    <!-- PROGRESS -->
    <div class="w-full bg-zinc-700 h-2 rounded-full mb-2 overflow-hidden">
      <div id="progressBar"
        class="bg-gradient-to-r from-indigo-500 to-purple-500 h-2 rounded-full transition-all duration-300"
        style="width:0%">
      </div>
    </div>

    <p id="progressText" class="text-orange-400 mb-4 text-sm sm:text-base dots">
      Initializing
    </p>

    <!-- BUTTONS -->
    <button onclick="payments()" id="payBtn"
      disabled
      class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 py-2 rounded-lg text-sm sm:text-base disabled:opacity-50 disabled:cursor-not-allowed">
      Pay Now
    </button>

    <br><br>

    <button
      class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 py-2 rounded-lg text-sm sm:text-base">
      Back
    </button>
  </div>

  <!-- RIGHT (QR) -->
  <div class="w-full lg:w-[320px] flex flex-col items-center justify-center bg-zinc-800/60 rounded-xl p-4 relative">

    <h3 class="mb-3 text-sm sm:text-base">QR Payment</h3>

    <div id="timer" class="text-xs sm:text-sm text-gray-400 mb-2">
      Expires in: 02:00
    </div>

    <div id="qrWrapper" class="locked">
      <div class="bg-white p-3 sm:p-4 rounded-xl glow pulse">
        <div id="qrcode" class="mx-auto"></div>
      </div>
    </div>

    <p id="scanText" class="text-gray-400 text-xs sm:text-sm mt-3 text-center">
      Waiting for payment...
    </p>

    <!-- SUCCESS -->
    <div id="successBox"
      class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/80 rounded-xl text-center p-4">

      <h2 class="text-green-400 text-xl sm:text-2xl font-bold mb-2">
        <i class="fa-solid fa-circle-check"></i> Paid
      </h2>

      <p class="text-gray-400 text-sm">Redirecting...</p>
    </div>

  </div>

</div>
</div>

<script>

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* LOAD */
function loadOrder(){
  let total = 0;
  let list = document.getElementById("orderList");
//   let images = document.getElementById("images");

  list.innerHTML = "";

  cart.forEach(item=>{
    let t = item.price * item.qty;
    total += t;

    list.innerHTML += `
      <div class="flex justify-start gap-4 items-center border-b border-zinc-700 pb-1">
         <img class="w-30 h-30 object-cover rounded" src="${item.image}" alt="">
        <span>Name : ${item.name}<br>
            Qty :  ${item.qty} <br>
            Price  : $${t} <br>
            Date : ${new Date().toLocaleDateString()}</span><br>
      </div>`;
  });

  document.getElementById("totalPrice").innerText = total;
}


// Select Banks
let Banks = null;
function selectBank(bank, el) {
  Banks = bank;

  // remove active style from all
  document.querySelectorAll(".bank-btn").forEach(btn => {
    btn.classList.remove("bg-yellow-500", "text-black");
  });

  // highlight selected
  el.classList.add("bg-yellow-500", "text-black");

  // enable pay button
  document.getElementById("payBtn").disabled = false;
}
/* PAYMENT */
function payments() {
  
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  if (!Banks) {
    alert("⚠️ Please select a bank first!");
    return;
  }

  // now allowed
  if(confirm('whoould you lkie to pay with '+Banks)){

    document.getElementById("payBtn").disabled = true;
    startProgress();
  }else{
    alert("Good Luck Bro! ");
  }


}

/* PROGRESS */
let progress = 0;

function startProgress(){
  document.getElementById("progressText").innerText = "Processing";

  let interval = setInterval(()=>{
    progress += 4;
    document.getElementById("progressBar").style.width = progress + "%";

    if(progress >= 100){
      clearInterval(interval);
      unlockQR();
    }
  },150);
}

/* UNLOCK + GENERATE QR */
async function unlockQR(){
  const qr = document.getElementById("qrWrapper");

  qr.classList.remove("locked");
  document.getElementById("scanText").innerText = "📲 Scan now";

  await showQRCode();
}

/* QR */
async function showQRCode(){

  const qrWrapper = document.getElementById("qrWrapper");
  const qrDiv = document.getElementById("qrcode");

  // 🔥 FORCE VISIBILITY FIRST
  qrWrapper.style.opacity = "1";
  qrWrapper.style.transform = "scale(1)";
  qrWrapper.classList.remove("locked");

  // wait DOM paint
  await new Promise(r => requestAnimationFrame(r));

  // clear old QR
  qrDiv.innerHTML = "";

  const res = await fetch("http://192.168.0.54:3000/create-payment", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      amount: document.getElementById("totalPrice").innerText
    })
  });

  const data = await res.json();

  console.log("PAYMENT RESPONSE:", data);

  const paymentId = data.paymentId;

  const scanUrl = `http://192.168.0.54:5500/Page/Payment/scan.html?id=${paymentId}`;

  console.log("QR URL:", scanUrl);

  // 🔥 IMPORTANT: create QR AFTER DOM is fully visible
  setTimeout(() => {
    new QRCode(qrDiv, {
      text: scanUrl,
      width: 180,
      height: 180,
      colorDark: "#000",
      colorLight: "#ffffff"
    });
  }, 50);

  startWatcher(paymentId);
  startTimer();
}
/* TIMER */
function startTimer(){
  let time = 120;

  let t = setInterval(()=>{
    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
      `Expires in: ${m}:${s<10?'0'+s:s}`;

    if(time <= 0){
      clearInterval(t);
      location.reload();
    }
  },1000);
}

/* SOCKET */
function startWatcher(paymentId){
  const socket = io("http://192.168.0.54:3000");

  socket.on("payment-success", (data)=>{
    if(data.paymentId === paymentId){
      success();
    }
  });
}

/* SUCCESS */
function success(){
  document.getElementById("successBox").classList.remove("hidden");

  localStorage.removeItem("cart");

  setTimeout(()=>{
    window.location.href = "/Page/Home/Home.html";
  },2500);
}

/* INIT */
loadOrder();

</script>

</body>
</html>
