<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | VEXO Couple</title>

<link rel="stylesheet" href="/src/output.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-fadeUp {
  animation: fadeUp 0.6s ease forwards;
}
</style>

</head>

<body class="h-screen flex items-center justify-center bg-gradient-to-b from-black via-gray-900 to-black text-white">

<!-- LOGIN CARD -->
<div class="w-[380px] bg-white/5 border border-white/10 backdrop-blur-md rounded-2xl p-8 shadow-2xl animate-fadeUp">

  <!-- TITLE -->
  <h2 class="text-3xl font-extrabold text-center text-pink-400 mb-2">
    VEXO LOGIN ❤️
  </h2>

  <p class="text-center text-gray-400 text-sm mb-6">
    Welcome back to Couple Fashion
  </p>

  <form onsubmit="return sub()" class="space-y-4">

    <!-- EMAIL -->
    <div>
      <label class="text-sm text-gray-400">Email</label>
      <input id="email" type="email" placeholder="Enter your email"
        class="w-full mt-1 px-4 py-3 rounded-lg bg-black/40 border border-white/20 focus:outline-none focus:ring-2 focus:ring-pink-400">
    </div>

    <!-- PASSWORD -->
    <div>
      <label class="text-sm text-gray-400">Password</label>
      <input id="password" type="password" placeholder="Enter your password"
        class="w-full mt-1 px-4 py-3 rounded-lg bg-black/40 border border-white/20 focus:outline-none focus:ring-2 focus:ring-cyan-400">
    </div>

    <!-- REMEMBER -->
    <div class="flex items-center justify-between text-sm text-gray-400">
      <label class="flex items-center gap-2">
        <input type="checkbox" class="accent-pink-400">
        Remember me
      </label>

      <a href="#" class="text-pink-400 hover:underline">Forgot?</a>
    </div>

    <!-- BUTTON -->
    <button type="submit"
      class="w-full py-3 rounded-lg bg-gradient-to-r from-pink-400 to-red-500 font-bold hover:scale-105 transition shadow-lg">
      Login ❤️
    </button>

    <!-- RESET -->
    <button type="reset"
      class="w-full py-3 rounded-lg bg-white/10 border border-white/10 hover:bg-white/20 transition">
      Reset
    </button>

  </form>

  <!-- FOOT NOTE -->
  <p class="text-center text-xs text-gray-500 mt-5">
    © 2026 VEXO Couple Fashion
  </p>

</div>

<script>
function sub() {
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("❌ Please fill all fields");
    return false;
  }

  if (!email.includes("@")) {
    alert("❌ Invalid email");
    return false;
  }

  alert("❤️ Login Successful!");
  window.location.href = "Home.html";

  return false;
}
</script>

</body>
</html>
