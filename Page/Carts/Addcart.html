<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXO Cart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* ===== TITLE ===== */
.title {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
}

/* ===== GLASS EFFECT ===== */
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
}

/* ===== CART ITEM ===== */
.cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 16px;
    margin-bottom: 15px;
    transition: 0.3s;
}

.cart-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ===== IMAGE ===== */
.cart-img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 12px;
}

/* ===== LEFT ===== */
.left {
    display: flex;
    align-items: center;
    gap: 15px;
    width: 40%;
}

/* ===== PRICE ===== */
.price {
    font-size: 18px;
    font-weight: bold;
    color: cyan;
}

/* ===== QTY BUTTON ===== */
.qty-box {
    display: flex;
    align-items: center;
    gap: 10px;
}

.qty-btn {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.plus { background: #22c55e; }
.minus { background: #ef4444; }

.qty-btn:hover {
    transform: scale(1.1);
}

/* ===== REMOVE ===== */
.remove {
    color: #ef4444;
    cursor: pointer;
}

.remove:hover {
    transform: scale(1.2);
}

/* ===== TOTAL ===== */
.total-box {
    margin-top: 20px;
    padding: 20px;
    text-align: right;
}

/* ===== BUTTON ===== */
.checkout {
    margin-top: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    background: linear-gradient(135deg, #ef4444, #f97316);
}

.checkout:hover {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
}

/* ===== EMPTY ===== */
.empty {
    text-align: center;
    padding: 80px;
    opacity: 0.7;
    animation: fade 0.5s;
}

@keyframes fade {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1;}
}

</style>
</head>

<body>

<div class="container">

    <h1 class="title">🛒 Your Cart</h1>

    <div id="cart"></div>

    <div id="total"></div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ===== LOAD CART ===== */
function loadCart() {

    let cartDiv = document.getElementById("cart");
    let totalDiv = document.getElementById("total");

    if(cart.length === 0){
        cartDiv.innerHTML = `
        <div class="empty">
            <h2>🛒 Cart is Empty</h2>
            <p>Add some products first</p>
            <button onclick="goHome()">Shop Now</button>
        </div>`;
        totalDiv.innerHTML = "";
        return;
    }

    let html = "";
    let total = 0;

    cart.forEach((item, index) => {

        total += item.price * item.qty;

        html += `
        <div class="cart-item glass">

            <div class="left">
                <img src="${item.image}" class="cart-img">
                <div>
                    <h4>${item.name}</h4>
                    <small>${item.size || ""}</small>
                </div>
            </div>

            <div class="price">$${item.price}</div>

            <div class="qty-box">
                <button class="qty-btn minus" onclick="changeQty(${index}, -1)">-</button>
                <span>${item.qty}</span>
                <button class="qty-btn plus" onclick="changeQty(${index}, 1)">+</button>
            </div>

            <div class="remove" onclick="removeItem(${index})">
                <i class="fa-solid fa-trash"></i>
            </div>

        </div>
        `;
    });

    cartDiv.innerHTML = html;

    totalDiv.innerHTML = `
    <div class="total-box glass">
        <h2>Total: $${total}</h2>
        <button class="checkout" onclick="checkout()">Checkout</button>
    </div>
    `;
}

/* ===== CHANGE QTY ===== */
function changeQty(index, amount){
    cart[index].qty += amount;

    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

/* ===== REMOVE ===== */
function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

/* ===== CHECKOUT ===== */
function checkout(){
    alert("Proceed to payment 💳");
    window.location.href ="/Page/Payment/Payment.html";
}

/* ===== GO HOME ===== */
function goHome(){
    window.location.href = "/Page/Home/Home.html";
}

loadCart();

</script>

</body>
</html>
