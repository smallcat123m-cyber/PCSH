<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="/src/output.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
.summary-box {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
}

.checkout-btn {
    background: linear-gradient(135deg, #ef4444, #f97316);
    transition: 0.3s;
}

.checkout-btn:hover {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    transform: scale(1.02);
}

.cart-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    transition: 0.3s;
}

.cart-row:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.cart-img {
    width: 70px;
    height: 70px;
    border-radius: 12px;
    object-fit: cover;
}

.btnup, .btndw {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.btnup { background: #22c55e; }
.btndw { background: #ef4444; }

.remove {
    background: transparent;
    color: #ef4444;
    font-size: 18px;
    cursor: pointer;
}

.remove:hover {
    transform: scale(1.2);
}

.empty {
    text-align: center;
    opacity: 0.7;
    padding: 80px;
}

.fbx {
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 12px;
    backdrop-filter: blur(10px);
}
</style>

</head>

<body class="bg-black text-white">

<!-- NAV -->
<nav class="flex justify-between items-center px-10 py-4 bg-gradient-to-r from-red-500 via-purple-500 to-blue-500">
    <h1 class="text-xl font-bold">🛒 VEXO CART</h1>

    <a onclick="goBack()" class="cursor-pointer bg-black/30 px-4 py-2 rounded-lg hover:bg-black/50">
        ← Back
    </a>
</nav>

<!-- CART -->
<section class="px-6 md:px-10 mt-10">

    <h2 class="text-3xl font-bold text-center mb-8">Your Shopping Cart</h2>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- ITEMS -->
        <div id="cart-items" class="lg:col-span-2 space-y-4"></div>

        <!-- SUMMARY -->
        <div class="summary-box p-6 h-fit sticky top-10">

            <h3 class="text-2xl font-bold mb-4">Summary</h3>

            <div class="flex justify-between mb-3">
                <span>Total Items</span>
                <span id="total-items">0</span>
            </div>

            <div class="flex justify-between text-xl font-bold mb-6">
                <span>Total</span>
                <span id="total-price">$0</span>
            </div>

            <button onclick="checkout()" class="checkout-btn w-full py-3 rounded-lg font-bold mb-3">
                Checkout
            </button>

            <button onclick="clearCart()" class="w-full bg-gray-700 py-3 rounded-lg hover:bg-gray-900">
                Clear Cart
            </button>

        </div>

    </div>

</section>

<script>

let selectedSize = "All";

// ================= LOAD CART =================
function loadCart() {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const cartContainer = document.getElementById("cart-items");
    const totalItems = document.getElementById("total-items");
    const totalPrice = document.getElementById("total-price");

    let total = 0;
    let count = 0;

    let html = `
    <div class="flex items-center gap-4 fbx mb-4">

        <span class="font-bold">Filter:</span>

        <select onchange="filterBySize(this.value)"
            class="bg-black/60 px-3 py-2 rounded-lg border border-white/10">

            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="Black">Black</option>
            <option value="White">White</option>
            <option value="All">All</option>

        </select>

    </div>
    `;

    cart.forEach((item, index) => {

        let itemSize = (item.size || "all").toLowerCase();
        let filter = selectedSize.toLowerCase();

        if (filter !== "all" && itemSize !== filter) return;

        if (!item.qty) item.qty = 1;

        total += item.price * item.qty;
        count++;

        html += `
        <div class="cart-row">

            <div class="flex items-center gap-4 w-1/3">
                <img src="${item.image}" class="cart-img">
                <div>
                    <h4 class="font-semibold">${item.name}</h4>
                    <p class="text-gray-400 text-sm">Model: ${item.size || "-"}</p>
                </div>
            </div>

            <div class="text-cyan-400 font-bold">$${item.price}</div>

            <div class="flex items-center gap-2">

                <button onclick="changeQty(${index}, -1)" class="btndw">-</button>

                <span>${item.qty}</span>

                <button onclick="changeQty(${index}, 1)" class="btnup">+</button>

            </div>

            <button onclick="removeItem(${index})" class="remove">
                <i class="fa-solid fa-trash"></i>
            </button>

        </div>
        `;
    });

    cartContainer.innerHTML = html;

    totalItems.innerText = count;
    totalPrice.innerText = "$" + total;

    localStorage.setItem("cart", JSON.stringify(cart));
}

// ================= FILTER =================
function filterBySize(size) {
    selectedSize = size;
    loadCart();
}

// ================= CHANGE QTY =================
function changeQty(index, value) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart[index].qty = (cart[index].qty || 1) + value;

    if (cart[index].qty <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

// ================= REMOVE =================
function removeItem(index) {

    if (!confirm("Remove this item?")) return;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

// ================= CLEAR =================
function clearCart() {

    if (!confirm("Clear all cart?")) return;

    localStorage.removeItem("cart");
    loadCart();
}

// ================= CHECKOUT =================
function checkout() {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }
      

    if (confirm("Proceed to checkout?")) {
        window.location.href = "/Page/Payment/Payment.html";
    }
}

// ================= BACK =================
function goBack() {
    window.location.href = "/Page/Home/Home.html";
}

</script>

</body>
</html>
