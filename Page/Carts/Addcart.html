<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXO Cart</title>

<link rel="stylesheet" href="/src/output.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
}

.cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 16px;
    margin-bottom: 15px;
}

.cart-item:hover {
    transform: translateY(-3px);
    transition: 0.3s;
}

.cart-img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 12px;
}

.left {
    display: flex;
    align-items: center;
    gap: 15px;
    width: 40%;
}

.price {
    font-size: 18px;
    font-weight: bold;
    color: cyan;
}

.qty-box input {
    width: 60px;
    text-align: center;
    padding: 5px;
    border-radius: 6px;
}

.remove {
    color: red;
    cursor: pointer;
}

.total-box {
    margin-top: 20px;
    padding: 20px;
    text-align: right;
}

.checkout {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #ef4444, #f97316);
    color: white;
    cursor: pointer;
}

/* MODAL */
#editModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: white;
    color: black;
    width: 350px;
    padding: 20px;
    border-radius: 12px;
}
.hidden {
    display: none !important;
}

@keyframes fadeIn {
    from {opacity:0; transform:scale(0.9);}
    to {opacity:1; transform:scale(1);}
}
.animate { animation: fadeIn 0.3s ease; }
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-5">
        <h1>🛒 Your Cart</h1>
        <button onclick="Back()" style="padding:8px 15px;background:#333;color:white;border-radius:8px;">
            ⬅ Back
        </button>
    </div>

    <!-- CART -->
    <div id="cart"></div>

    <!-- TOTAL -->
    <div id="total"></div>
</div>

<!-- ================= EDIT MODAL ================= -->
<div id="sizeModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

    <div class="bg-white text-black w-96 p-6 rounded-xl">

        <h2 class="text-xl font-bold mb-4">✏️ Edit Size</h2>

        <div id="sizeBox"></div>

        <div class="flex justify-end gap-2 mt-4">
            <button onclick="closeSizeModal()" class="px-4 py-2 bg-gray-400 text-white rounded">
                Cancel
            </button>

            <button onclick="saveEdit()" class="px-4 py-2 bg-blue-600 text-white rounded">
                Save
            </button>
        </div>

    </div>
</div>

<div id="colorModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

    <div class="bg-white text-black w-96 p-6 rounded-xl">

        <h2 class="text-xl font-bold mb-4">🎨 Edit Color</h2>

        <div id="colorBox"></div>

        <div class="flex justify-end gap-2 mt-4">
            <button onclick="closeModal()" class="px-4 py-2 bg-gray-400 text-white rounded">
                Cancel
            </button>

            <button onclick="saveEdit()" class="px-4 py-2 bg-blue-600 text-white rounded">
                Save
            </button>
        </div>

    </div>
</div>
<a href="/Page/Payment/Payment.html"></a>


<script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
let editIndex = null;

/* ================= SIZE OPTIONS ================= */
function getSizeOptions(type) {
    switch(type) {
        case "shirt":
        case "trousers":
            return ["XS", "S", "M", "L", "XL"];
        case "shoes":
            return ["20", "25", "33", "40"];
        default:
            return [];
    }
}

/* ================= COLOR OPTIONS ================= */
function getColorOptions() {
    return ["Black", "White", "Red", "Blue", "Gray"];
}

/* ================= LOAD CART ================= */
function loadCart() {

    let cartDiv = document.getElementById("cart");
    let totalDiv = document.getElementById("total");

    if (cart.length === 0) {
        cartDiv.innerHTML = `<h2 style="text-align:center;">🛒 Cart is Empty</h2>`;
        totalDiv.innerHTML = "";
        return;
    }

    let html = "";
    let total = 0;

    cart.forEach((item, index) => {

        total += item.price * item.qty;

        html += `
        <div class="cart-item glass">

            <div class="left">
                <img src="${item.image}" class="cart-img">
                <div>
                    <h4>${item.name}</h4>

                    <small>
                        ${
                            (item.type === "shirt" || item.type === "trousers" || item.type === "shoes")
                            ? `Size: ${item.size || "-"}`
                            : `Color: ${item.color || "-"}`
                        }
                    </small>
                </div>
            </div>

            <div class="price">$${item.price}</div>

            <div class="qty-box">
                <input type="number" min="1"
                value="${item.qty}"
                oninput="this.value=Math.max(1,this.value)"
                onchange="updateQty(${index},this.value)">
            </div>

            <!-- EDIT -->
            <i onclick="editItem(${index})" class="fa-solid fa-pencil"></i>

            <!-- DELETE -->
            <div class="remove" onclick="removeItem(${index})">
                <i class="fa-solid fa-trash"></i>
            </div>

        </div>`;
    });

    cartDiv.innerHTML = html;

    totalDiv.innerHTML = `
        <div class="total-box glass">
            <h2>Total: $${total}</h2>
            <button onclick="Checkout()" class="checkout">Checkout</button>
        </div>
    `;
}

function Checkout(){
    window.location.href="/Page/Payment/Payment.html";
}

/* ================= UPDATE QTY ================= */
function updateQty(index, value) {
    cart[index].qty = parseInt(value);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

/* ================= DELETE ================= */
function removeItem(index) {
    if (confirm("Delete item?")) {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
    }
}

/* ================= EDIT MAIN ================= */
function editItem(index) {
    editIndex = index;

    let item = cart[index];

    const sizeOptions = getSizeOptions(item.type);

    if (sizeOptions.length > 0) {
        renderSizeBox(item);
        document.getElementById("sizeModal").classList.remove("hidden");
    } else {
        renderColorBox(item);
        document.getElementById("colorModal").classList.remove("hidden");
    }
}

/* ================= SIZE BOX ================= */
function renderSizeBox(item) {

    const sizeOptions = getSizeOptions(item.type);

    let html = `<label>Size</label>
    <select id="editSize" class="w-full p-2 border rounded mb-3">`;

    if (sizeOptions.length > 0) {
        sizeOptions.forEach(s => {
            html += `<option value="${s}">${s}</option>`;
        });
    } else {
        html += `<option value="">No size</option>`;
    }

    html += `</select>`;

    document.getElementById("sizeBox").innerHTML = html;

    setTimeout(() => {
        document.getElementById("editSize").value = item.size || "";
    }, 50);
}

/* ================= COLOR BOX ================= */
function renderColorBox(item) {

    const colors = getColorOptions();

    let html = `<label>Color</label>
    <select id="editColor" class="w-full p-2 border rounded mb-3">`;

    colors.forEach(c => {
        html += `<option value="${c}">${c}</option>`;
    });

    html += `</select>`;

    document.getElementById("colorBox").innerHTML = html;

    setTimeout(() => {
        document.getElementById("editColor").value = item.color || "";
    }, 50);
}

/* ================= SAVE ================= */
function saveEdit() {

    if (editIndex === null) return;

    let item = cart[editIndex];
    if(document.getElementById("editSize")){

        item.size = document.getElementById("editSize").value;
    }else{

        item.color = document.getElementById("editColor").value;
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    closeModal();
    loadCart();
}

/* ================= CLOSE MODAL ================= */
function closeModal() {
    document.getElementById("colorModal").classList.add("hidden");
    document.getElementById("sizeModal").classList.add("hidden");
}

/* ================= BACK ================= */
function Back() {
    if (history.length > 1) history.back();
    else window.location.href = "/Page/Home/Home.html";
}

loadCart();
</script>

</body>
</html>
